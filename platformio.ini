; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
firmware_version = '{3, 1, 26}'
device_name = '"vuesp-"'

[platformio]
build_dir = build

[env:esp8266]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
build_src_filter = +<*> -<tests/*>
lib_deps = 
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	paulstoffregen/OneWire@^2.3.8
build_flags = 
	-D DEF_DEVICE_FIRMWARE=${common.firmware_version}
	-D DEF_DEVICE_NAME=${common.device_name}
	-D CURRENT_TIME=$UNIX_TIME
	-D DEF_BOARD=1

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
board_build.mklittlefs = $PROJECT_DIR/mklittlefs
platform_packages = 
    tool-esptoolpy@https://github.com/Jason2866/esptool/releases/download/v5.2.0/esptool.zip
build_src_filter = +<*> -<tests/*>
lib_deps = 
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	paulstoffregen/OneWire@^2.3.8
build_flags = 
	-D DEF_DEVICE_FIRMWARE=${common.firmware_version}
	-D DEF_DEVICE_NAME=${common.device_name}
	-D CURRENT_TIME=$UNIX_TIME
	-D DEF_BOARD=2

[env:pico32]
platform = espressif32
board = pico32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
board_build.mklittlefs = $PROJECT_DIR/mklittlefs
platform_packages = 
    tool-esptoolpy@https://github.com/Jason2866/esptool/releases/download/v5.2.0/esptool.zip
build_src_filter = +<*> -<tests/*>
lib_deps = 
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	paulstoffregen/OneWire@^2.3.8
build_flags = 
	-D DEF_DEVICE_FIRMWARE=${common.firmware_version}
	-D DEF_DEVICE_NAME=${common.device_name}
	-D CURRENT_TIME=$UNIX_TIME
	-D DEF_BOARD=2

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
board_build.mklittlefs = $PROJECT_DIR/mklittlefs
platform_packages = 
    tool-esptoolpy@https://github.com/Jason2866/esptool/releases/download/v5.2.0/esptool.zip
build_src_filter = +<*> -<tests/*>
lib_deps = 
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	paulstoffregen/OneWire@^2.3.8
build_flags = 
	-D DEF_DEVICE_FIRMWARE=${common.firmware_version}
	-D DEF_DEVICE_NAME=${common.device_name}
	-D CURRENT_TIME=$UNIX_TIME
	-D DEF_BOARD=2
	-D ARDUINO_USB_MODE=1 
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_ESP32C3_DEV=1